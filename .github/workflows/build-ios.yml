name: Build iPSX2 iOS

# Déclenche sur chaque push sur main, ou manuellement depuis l'onglet Actions
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iPSX2 (iOS arm64)
    runs-on: macos-15 # Apple Silicon M2 — Xcode 16, Swift 6 ✓
    timeout-minutes: 90 # Sécurité : 1h30 max

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Pas besoin de tout l'historique git

      # ── 2. Sélectionner Xcode ──────────────────────────────────────────────
      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -1d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "::error::No Xcode.app found in /Applications"
            ls -la /Applications || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Detect iOS SDK
        run: |
          set -euo pipefail
          IOS_DEPLOYMENT_TARGET="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ -z "$IOS_DEPLOYMENT_TARGET" ]]; then
            echo "::error::No iOS SDK detected (xcrun --sdk iphoneos failed)."
            xcodebuild -showsdks || true
            exit 1
          fi
          IOS_SDK="iphoneos"
          echo "IOS_SDK=$IOS_SDK" >> "$GITHUB_ENV"
          echo "IOS_DEPLOYMENT_TARGET=$IOS_DEPLOYMENT_TARGET" >> "$GITHUB_ENV"

      # ── 3. Installer cmake et ninja ─────────────────────────────────────────
      - name: Install cmake & ninja
        run: brew install cmake ninja

      # ── 4. Cache cmake build directory ─────────────────────────────────────
      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-ios-${{ hashFiles('src/cpp/CMakeLists.txt', 'src/cpp/common/CMakeLists.txt', 'src/cpp/pcsx2/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-ios-

      # ── 5. Configurer cmake → génère iPSX2.xcodeproj ───────────────────────
      - name: CMake configure
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            "$GITHUB_WORKSPACE/src/cpp" 2>&1 | tee cmake_output.txt
          # Extraire erreurs et les mettre dans le Summary public
          echo '## CMake Output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(Error|error|Warning|CMake Error|failed|FAILED)' cmake_output.txt | tail -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Echouer si cmake a échoué
          grep -q 'Configuring incomplete\|Error\|error' cmake_output.txt && exit 1 || exit 0

      # ── 6. Compiler avec xcodebuild ─────────────────────────────────────────
      - name: Build (xcodebuild)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$GITHUB_WORKSPACE/build/iPSX2.xcodeproj" \
            -scheme iPSX2 \
            -configuration Release \
            -sdk "$IOS_SDK" \
            -derivedDataPath "$GITHUB_WORKSPACE/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            build \
            2>&1 | tee build.log
          # Résumé des erreurs de build dans le Summary public
          echo '## Build Output (errors)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(error:|Error:|FAILED|BUILD FAILED)' build.log | tail -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Vérifier que le .app a bien été produit
          find "$GITHUB_WORKSPACE/build/DerivedData" -name "iPSX2.app" -type d | head -3

      # ── 7. Packager en .ipa ─────────────────────────────────────────────────
      - name: Package IPA
        run: |
          APP=$(find "$GITHUB_WORKSPACE/build/DerivedData" -name "iPSX2.app" -type d | head -1)
          echo "App trouvée : $APP"
          mkdir -p "$GITHUB_WORKSPACE/Payload"
          cp -r "$APP" "$GITHUB_WORKSPACE/Payload/iPSX2.app"
          cd "$GITHUB_WORKSPACE"
          zip -r iPSX2.ipa Payload/
          ls -lh iPSX2.ipa

      # ── 8. Upload l'IPA comme artifact téléchargeable ──────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPSX2-${{ github.sha }}
          path: iPSX2.ipa
          retention-days: 14 # Dispo 2 semaines

      # ── 9. Upload les logs si la build échoue ──────────────────────────────
      - name: Upload build logs (si erreur)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build.log
          retention-days: 7
